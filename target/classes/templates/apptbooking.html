<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Available Times</title>
        <link rel="stylesheet" th:href="@{/css/global.css}">
        <link rel="stylesheet" th:href="@{/css/appointment.css}">
        <link rel="stylesheet" th:href="@{/css/navbar.css}">
        <link rel="stylesheet" th:href="@{/css/footer.css}">
    </head>

    <body>
        <!--NAVBAR-->
        <div th:replace="fragments/navbar :: navbar"></div>

        <main>
            <h1>Available Times</h1>

            <div class="layout">
                <section>
                    <h2>Upcoming Appointments</h2>
                    <div id="appointments"></div>
                </section>

                <section>
                    <h2>Select a Date</h2>

                    <div class="calendar-box">
                        <div class="calendar-header">
                            <button onclick="changeMonth(-1)">‹</button>

                            <select id="monthSelect" onchange="renderCalendar()"></select>
                            <select id="yearSelect" onchange="renderCalendar()"></select>

                            <button onclick="changeMonth(1)">›</button>
                        </div>

                        <div class="calendar-grid" id="calendar"></div>
                    </div>

                    <label for="clinicFilter">Clinic</label>
                    <select id="clinicFilter" onchange="renderSlots()">
                        <option value="All Clinics">All Clinics</option>
                        <option value="Clinic Orange">Clinic Orange</option>
                        <option value="Clinic Tandarine">Clinic Tandarine</option>
                    </select>

                    <label for="doctorFilter">Doctor</label>
                    <select id="doctorFilter" onchange="renderSlots()">
                        <option value="All Doctors">All Doctors</option>
                        <option value="Dr. T">Dr. T</option>
                        <option value="Dr. A">Dr. A</option>
                        <option value="Dr. B">Dr. B</option>
                    </select>

                    <label>Available Slots</label>
                    <div class="slot-list" id="slots"></div>
                </section>
            </div>
        </main>

        <!-- FOOTER -->
        <div th:replace="/fragments/footer :: footer"></div>

        <script src="/js/booking.js"></script>
        <script src="/js/main.js"></script>
    </body>
</html>
