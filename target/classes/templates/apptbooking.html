<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Available Times</title>
        <link rel="stylesheet" th:href="@{/css/global.css}">
        <link rel="stylesheet" th:href="@{/css/appointment.css}">
        <link rel="stylesheet" th:href="@{/css/navbar.css}">
        <link rel="stylesheet" th:href="@{/css/footer.css}">
    </head>

    <body>
        <!--NAVBAR-->
        <div th:replace="fragments/navbar :: navbar"></div>

        <main>
            <h1>Available Times</h1>

            <div class="layout">
                <section>
                    <h2>Upcoming Appointments</h2>
                    <div id="appointments"></div>
                </section>

                <section>
                    <h2>Select a Date</h2>

                    <div class="calendar-box">
                        <div class="calendar-header">
                            <button onclick="changeMonth(-1)">‹</button>

                            <select id="monthSelect" onchange="renderCalendar()"></select>
                            <select id="yearSelect" onchange="renderCalendar()"></select>

                            <button onclick="changeMonth(1)">›</button>
                        </div>

                        <div class="calendar-grid" id="calendar"></div>
                    </div>

                    <div class="selected-date-row" id="selectedDateRow" style="display:none">
                        <span id="selectedDateLabel"></span>
                        <button id="createSlotBtn" onclick="openCreateSlotModal()">+ New Slot</button>
                    </div>

                    <label for="clinicFilter">Clinic</label>
                    <select id="clinicFilter" onchange="renderSlots()">
                        <option value="">All Clinics</option>
                    </select>

                    <label for="doctorFilter">Doctor</label>
                    <select id="doctorFilter" onchange="renderSlots()">
                        <option value="">All Doctors</option>
                    </select>

                    <label>Available Slots</label>
                    <div class="slot-list" id="slots"></div>
                </section>
            </div>
        </main>

        <!-- FOOTER -->
        <div th:replace="/fragments/footer :: footer"></div>

        <!-- CREATE SLOT MODAL -->
        <div id="createSlotModal" style="display:none" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>Create New Slot</h3>
                    <button onclick="closeCreateSlotModal()" class="modal-close">✕</button>
                </div>

                <div class="modal-body">
                    <label for="slotDate">Date</label>
                    <input type="date" id="slotDate" readonly />

                    <label for="slotProvider">Provider</label>
                    <select id="slotProvider"></select>

                    <label for="slotStart">Start Time</label>
                    <input type="time" id="slotStart" />

                    <label for="slotDuration">Duration</label>
                    <select id="slotDuration">
                        <option value="60">1 hour</option>
                        <option value="120">2 hours</option>
                        <option value="180">3 hours</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button onclick="closeCreateSlotModal()" class="btn-cancel">Cancel</button>
                    <button onclick="submitCreateSlot()" class="btn-confirm">Create</button>
                </div>
            </div>
        </div>

        <script src="/js/sessions.js"></script>
        <script src="/js/utils.js"></script>
        <script src="/js/auth.js"></script>
        <script src="/js/calendar.js"></script>
        <script src="/js/slots.js"></script>
        <script src="/js/appointments.js"></script>
        <script src="/js/booking.js"></script>
        <script src="/js/main.js"></script>
    </body>
</html>
