<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book an Appointment</title>
</head>
<body>
  <h2>All appointments</h2>
    <script>
        fetch("http://localhost:8080/appointments")
            .then(response => response.json())
            .then(data => {
                data.forEach(appt => {
                    const div = document.createElement("div");
                    div.innerHTML = `
                        <h3>Appointment # ${appt.id}</h3>
                        <p>Patient: ${appt.patient.firstName} ${appt.patient.lastName}</p>
                        <p>Time: ${appt.availableSlot.startTime} - ${appt.availableSlot.endTime}</p>
                        <p>Provider: ${appt.availableSlot.provider.firstName} ${appt.availableSlot.provider.lastName} (${appt.availableSlot.provider.type})</p>
                        <p>Service: ${appt.service}</p>
                        <p>Status: ${appt.status}</p>
                        <hr>
                        `;
                    document.body.appendChild(div);
                });
            })
            .catch(error => console.log("Error:", error));
    </script>
</body>
</html>
